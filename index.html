<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildBright</title>
    <link rel="stylesheet" href="style.css">
    <script src="algebra1-lessons.js" defer></script>
    <script src="geometry-lessons.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body class="landing">

    <main class="homepage">

        <section class="hero-card">

            <div class="brand-pill">
                ✨ BuildBright Learning
            </div>

            <h1>Built for Clarity. Backed by Logic.</h1>

            <p>
                Master Algebra, Geometry, and Calculus with clean lessons,
                guided quizzes, progress tracking, XP, and achievements.
            </p>

            <button class="button hero-button" onclick="showCourseSelector()">
                Start Learning
            </button>

        </section>

        <section class="dashboard-stats">

            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div>
                    <p>Current Streak</p>
                    <h3 id="streak">0 days</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div>
                    <p>Total XP</p>
                    <h3 id="xp-display">0 XP</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div>
                    <p>Course Progress</p>
                    <h3 id="global-progress">0%</h3>
                </div>
            </div>

        </section>

        <section id="course-selector" class="selector-card" style="display:none;">

            <h2>Choose Your Course</h2>

            <label for="subject-select">Math Course</label>

            <select id="subject-select" onchange="loadTopics()">
                <option value="">Select course</option>
                <option value="algebra1">Algebra 1</option>
                <option value="geometry">Geometry</option>
                <option value="algebra2">Algebra 2</option>
                <option value="calculus1">Calculus 1</option>
                <option value="calculus2">Calculus 2</option>
                <option value="calculus3">Calculus 3</option>
                <option value="calculus4">Calculus 4</option>
            </select>

            <label for="topic-select">Topic</label>

            <select id="topic-select">
                <option value="">Select topic</option>
            </select>

            <button class="button" onclick="startSelectedLesson()">
                Start Lesson
            </button>

        </section>

    </main>

</body>

</html>
