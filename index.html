<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildBright</title>
    <link rel="stylesheet" href="style.css">
    <script src="algebra1-lessons.js" defer></script>
    <script src="geometry-lessons.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body class="landing">

    <div class="progress-tracker">

        <div>
            📈 Progress:
            <span id="global-progress">0%</span>
        </div>

        <div id="streak">
            🔥 Streak: 0 days
        </div>

        <div id="xp-display">
            ⭐ XP: 0
        </div>

    </div>

    <main class="hero-screen">

        <h1>Built for Clarity. Backed by Logic.</h1>

        <p>
            From Algebra 1 to Calculus 4. Learn with precision and simplicity, like never before.
        </p>

        <button class="button" onclick="showCourseSelector()">
            Get Started
        </button>

        <section id="course-selector" class="selector-card" style="display: none;">

            <label for="subject-select">Choose your math course</label>

            <select id="subject-select" onchange="loadTopics()">
                <option value="">Select course</option>
                <option value="algebra1">Algebra 1</option>
                <option value="geometry">Geometry</option>
                <option value="algebra2">Algebra 2</option>
                <option value="calculus1">Calculus 1</option>
                <option value="calculus2">Calculus 2</option>
                <option value="calculus3">Calculus 3</option>
                <option value="calculus4">Calculus 4</option>
            </select>

            <label for="topic-select">Choose a topic</label>

            <select id="topic-select">
                <option value="">Select topic</option>
            </select>

            <button class="button" onclick="startSelectedLesson()">
                Start Lesson
            </button>

        </section>

    </main>

</body>

</html>
